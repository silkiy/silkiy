<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="50%" stop-color="#0d0d1f" />
      <stop offset="100%" stop-color="#141341" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bgGrad)" rx="16" />

  <!-- Geometric grid background (Subtle tech lines) -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  <path d="M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  
  <!-- Modern abstract tech accents -->
  <circle cx="750" cy="50" r="100" fill="#00f2fe" fill-opacity="0.03" filter="url(#glow)"/>
  <circle cx="50" cy="200" r="70" fill="#4facfe" fill-opacity="0.03" filter="url(#glow)"/>

  <!-- Left border accent stripe -->
  <rect x="0" y="0" width="8" height="250" fill="url(#textGrad)" rx="4" />

  <!-- Animated neon-like dot signals -->
  <circle cx="120" cy="70" r="3" fill="#00f2fe" filter="url(#glow)"/>
  <circle cx="680" cy="180" r="4" fill="#4facfe" filter="url(#glow)"/>
  <line x1="120" y1="70" x2="220" y2="70" stroke="#00f2fe" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4 4" />
  <line x1="580" y1="180" x2="680" y2="180" stroke="#4facfe" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Main Name Text -->
  <text x="60" y="115" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="900" font-size="42" fill="url(#textGrad)" letter-spacing="3">WILDAN SILKI</text>
  
  <!-- Subtitle -->
  <text x="60" y="150" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e2e8f0" letter-spacing="1">Software Engineer &amp; Web3 Specialist</text>

  <!-- Core tags -->
  <g transform="translate(60, 185)">
    <!-- Tag 1 -->
    <rect x="0" y="0" width="105" height="26" rx="13" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="52.5" y="17" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="700" font-size="11" fill="#a5b4fc" text-anchor="middle">FULL-STACK</text>

    <!-- Tag 2 -->
    <rect x="115" y="0" width="70" height="26" rx="13" fill="#064e3b" stroke="#047857" stroke-width="1"/>
    <text x="150" y="17" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="700" font-size="11" fill="#a7f3d0" text-anchor="middle">WEB3</text>

    <!-- Tag 3 -->
    <rect x="195" y="0" width="135" height="26" rx="13" fill="#1e3a8a" stroke="#1d4ed8" stroke-width="1"/>
    <text x="262.5" y="17" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="700" font-size="11" fill="#bfdbfe" text-anchor="middle">GAME DEVELOPER</text>
  </g>

  <!-- "Available for Remote Work" Indicator -->
  <g transform="translate(560, 100)">
    <circle cx="10" cy="10" r="6" fill="#10b981" filter="url(#glow)"/>
    <circle cx="10" cy="10" r="10" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="r" values="8;16;8" dur="3s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite" />
    </circle>
    <text x="28" y="14" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="600" font-size="12" fill="#94a3b8" letter-spacing="0.5">Available for Remote</text>
  </g>
</svg>
